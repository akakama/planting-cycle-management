server:
  port: 8083
  servlet:
    context-path: /api

spring:
  application:
    name: planting-backend

  # 数据源配置
  datasource:
    # 使用MySQL数据库
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/planting_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    schema: classpath:schema.sql
    initialization-mode: always

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# JWT配置
jwt:
  secret: planting-cycle-management-secret-key-2025-planting-cycle-management-secret
  expiration: 86400000  # 24小时(毫秒)
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.planting: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/planting-backend.log
    max-size: 10MB
    max-history: 30

# Knife4j配置
knife4j:
  enable: false
  setting:
    language: zh_cn
  basic:
    enable: false
    username: admin
    password: admin123

# 线程池配置
async:
  executor:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    thread-name-prefix: async-executor-

# AI服务配置
ai:
  service:
    url: http://localhost:8000
    model: qwen2.5-7b
    timeout: 30000
