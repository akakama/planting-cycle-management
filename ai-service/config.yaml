# AI 服务配置文件

# 应用配置
app:
  host: "0.0.0.0"
  port: 8000
  debug: false

# vLLM 配置
vllm:
  api_url: "http://localhost:8001"
  model_name: "qwen2.5-7b"
  max_tokens: 2048
  temperature: 0.7

# ChromaDB 配置
chromadb:
  host: "localhost"
  port: 8000
  collection_name: "planting_knowledge"

# 图像识别配置
image_recognition:
  model_path: "ai-service/models/mobilenetv3.pth"
  confidence_threshold: 0.6
  max_image_size: 10485760  # 10MB
  supported_formats: ["image/jpeg", "image/jpg", "image/png"]

# 工具配置
tools:
  weather_api_key: ""
  weather_api_url: "https://api.weather.example.com"
  pesticide_db_path: "data/pesticides.db"
  backend_url: "http://localhost:8083"

# 日志配置
logging:
  level: "INFO"
  file: "logs/ai-service.log"
  rotation: "10 MB"
  retention: "7 days"
